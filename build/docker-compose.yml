version: "3.9"

services:
  local:
    build:
      context: ../
      dockerfile: build/dockerfile
    container_name: speechbrain
    stdin_open: true
    tty: true
    image: speechbrain:v0.0.5-cartography-enabled
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /mnt/d/code/speechbrain/:/speechbrain
      - /mnt/d/datasets/:/datasets
      - /mnt/d/models/:/models
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 32gb
  
  tensorboard:
    stdin_open: true
    tty: true
    image: speechbrain:v0.0.5-cartography-enabled
    ports:
      - 6006:6006
    volumes:
      - /mnt/d/code/speechbrain/recipes/mms/lang_id/logdir:/logs
    command: tensorboard --logdir /logs --host 0.0.0.0 --port 6006